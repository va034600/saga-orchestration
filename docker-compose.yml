version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
      POSTGRES_DB: saga
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - saga-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d saga"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.8
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,events
      DEBUG: 0
    volumes:
      - ./localstack:/etc/localstack/init/ready.d
    networks:
      - saga-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  saga-network:
    driver: bridge

volumes:
  postgres-data:
