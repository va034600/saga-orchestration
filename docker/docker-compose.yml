version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
      POSTGRES_DB: saga
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - saga-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d saga"]
      interval: 5s
      timeout: 5s
      retries: 5

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger-ui
    ports:
      - "8090:8080"
    volumes:
      - ../services/orchestrator/openapi.yml:/usr/share/nginx/html/specs/orchestrator.yml:ro
      - ../services/order-service/openapi.yml:/usr/share/nginx/html/specs/order-service.yml:ro
      - ../services/payment-service/openapi.yml:/usr/share/nginx/html/specs/payment-service.yml:ro
      - ../kotlin/compensation-service/bootstrap/openapi.yml:/usr/share/nginx/html/specs/compensation-service.yml:ro
    environment:
      URLS: >-
        [
          {"url":"/specs/orchestrator.yml","name":"Orchestrator (:8080)"},
          {"url":"/specs/order-service.yml","name":"Order Service (:8081)"},
          {"url":"/specs/payment-service.yml","name":"Payment Service (:8083)"},
          {"url":"/specs/compensation-service.yml","name":"Compensation Service (:8084)"}
        ]

  tbls:
    build: ./tbls
    container_name: tbls
    ports:
      - "3000:3000"
    volumes:
      - ../services/orchestrator/db/migration:/migration/orchestrator:ro
      - ../services/order-service/db/migration:/migration/order-service:ro
      - ../services/payment-service/db/migration:/migration/payment-service:ro
      - ../services/compensation-service/db/migration:/migration/compensation-service:ro
      - ../services/orchestrator/.tbls.yml:/config/orchestrator/.tbls.yml:ro
      - ../services/order-service/.tbls.yml:/config/order-service/.tbls.yml:ro
      - ../services/payment-service/.tbls.yml:/config/payment-service/.tbls.yml:ro
      - ../services/compensation-service/.tbls.yml:/config/compensation-service/.tbls.yml:ro
      - ../docs/schema-style.css:/style/schema-style.css:ro
    networks:
      - saga-network
    depends_on:
      postgres:
        condition: service_healthy

  localstack:
    image: localstack/localstack:4.13
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,events,stepfunctions,lambda
      DEFAULT_REGION: ap-northeast-1
      DEBUG: 0
      LAMBDA_DOCKER_FLAGS: "--add-host=host.docker.internal:host-gateway"
      LAMBDA_DOCKER_NETWORK: ${LAMBDA_DOCKER_NETWORK:-docker_saga-network}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack:/etc/localstack/init/ready.d
    networks:
      - saga-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  saga-network:
    driver: bridge

volumes:
  postgres-data:
