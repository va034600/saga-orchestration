name: Go Test
on:
  push:
    branches: [main]
    paths: ['go/**']
  pull_request:
    paths: ['go/**']
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run tests
        working-directory: go/payment-service
        run: go test ./...
