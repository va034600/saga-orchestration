name: Test

on:
  push:
    branches: [main]
    paths:
      - 'kotlin/**'
      - 'services/**'
  pull_request:
    paths:
      - 'kotlin/**'
      - 'services/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and run unit tests
        working-directory: kotlin
        run: ./gradlew build -x integrationTest --parallel
      - name: Upload bootJar artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: boot-jars
          path: kotlin/*/bootstrap/build/libs/bootstrap-*.jar
          retention-days: 1

  integration-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run integration tests (H2)
        working-directory: kotlin
        run: ./gradlew integrationTest --parallel

  integration-test-postgresql:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run integration tests (PostgreSQL)
        working-directory: kotlin
        run: ./gradlew integrationTest --parallel
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

  e2e:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-northeast-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Start infrastructure and pre-pull Lambda image
        run: |
          docker pull public.ecr.aws/lambda/python:3.12 &
          cd docker && docker compose up -d postgres localstack
          wait

      - name: Download bootJar artifacts
        uses: actions/download-artifact@v4
        with:
          name: boot-jars
          path: kotlin

      - name: Wait for infrastructure
        run: |
          for i in $(seq 1 30); do
            docker exec postgres pg_isready -U saga -d saga > /dev/null 2>&1 && break
            sleep 2
          done
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Create databases and run migrations
        run: |
          declare -A DB_MAP=(
            [order-service]=order_db
            [payment-service]=payment_db
            [compensation-service]=compensation_db
            [orchestrator]=orchestrator_db
          )
          for service in "${!DB_MAP[@]}"; do
            db="${DB_MAP[$service]}"
            docker exec postgres psql -U saga -d saga -c "CREATE DATABASE $db" || true
            for sql in $(ls services/$service/db/migration/*.sql | sort); do
              docker exec -i postgres psql -U saga -d "$db" < "$sql"
            done
          done

      - name: Start services
        working-directory: kotlin
        run: |
          mkdir -p /tmp/e2e-logs
          COMMON_ENV="SPRING_DATASOURCE_USERNAME=saga SPRING_DATASOURCE_PASSWORD=saga SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver"

          env $COMMON_ENV SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/order_db \
            java -jar order-service/bootstrap/build/libs/bootstrap-*.jar > /tmp/e2e-logs/order-service.log 2>&1 &
          env $COMMON_ENV SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/payment_db \
            java -jar payment-service/bootstrap/build/libs/bootstrap-*.jar > /tmp/e2e-logs/payment-service.log 2>&1 &
          env $COMMON_ENV SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/compensation_db \
            java -jar compensation-service/bootstrap/build/libs/bootstrap-*.jar > /tmp/e2e-logs/compensation-service.log 2>&1 &
          env $COMMON_ENV SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/orchestrator_db \
            java -jar orchestrator/bootstrap/build/libs/bootstrap-*.jar > /tmp/e2e-logs/orchestrator.log 2>&1 &

      - name: Wait for services to be healthy
        run: |
          for port in 8080 8081 8083 8084; do
            echo "Waiting for port $port..."
            for i in $(seq 1 60); do
              curl -sf http://localhost:$port/actuator/health > /dev/null 2>&1 && break
              if [ $i -eq 60 ]; then echo "Port $port failed" && exit 1; fi
              sleep 2
            done
          done

      - name: Warm up Lambda
        run: |
          aws --endpoint-url=http://localhost:4566 lambda invoke \
            --function-name saga-http-proxy --cli-read-timeout 300 \
            --payload '{"action":"CREATE_ORDER","orderId":"warmup","productId":"x","quantity":1,"amount":1}' \
            /tmp/lambda-warmup.json 2>&1 || true

      - name: Run E2E tests
        working-directory: kotlin
        run: ./gradlew :e2e-test:test

      - name: Debug info
        if: failure()
        run: |
          ENDPOINT="--endpoint-url=http://localhost:4566"
          SM_ARN="arn:aws:states:ap-northeast-1:000000000000:stateMachine:order-saga"
          for ARN in $(aws $ENDPOINT stepfunctions list-executions --state-machine-arn "$SM_ARN" --query 'executions[].executionArn' --output text); do
            echo "=== $ARN ==="
            aws $ENDPOINT stepfunctions describe-execution --execution-arn "$ARN"
            aws $ENDPOINT stepfunctions get-execution-history --execution-arn "$ARN" \
              --query 'events[?type==`LambdaFunctionFailed` || type==`ExecutionFailed`]'
          done
          docker logs localstack --tail 50 2>&1

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            kotlin/e2e-test/build/reports/tests/test/
            /tmp/e2e-logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          pkill -f 'java -jar' || true
          cd docker && docker compose down -v
