name: Test

on:
  push:
    branches: [main]
    paths:
      - 'kotlin/**'
      - 'services/**'
  pull_request:
    paths:
      - 'kotlin/**'
      - 'services/**'

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        working-directory: kotlin
        run: ./gradlew test
      - name: Run integration tests
        working-directory: kotlin
        run: ./gradlew integrationTest

  test-postgresql:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        working-directory: kotlin
        run: ./gradlew test
      - name: Run integration tests
        working-directory: kotlin
        run: ./gradlew integrationTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

  e2e:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Start infrastructure
        working-directory: docker
        run: docker compose up -d postgres localstack

      - name: Build service JARs
        working-directory: kotlin
        run: ./gradlew clean bootJar -x test

      - name: Wait for infrastructure
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U saga -d saga > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 2
          done

          echo "Waiting for LocalStack..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack is ready"
              break
            fi
            sleep 2
          done

      - name: Start services
        working-directory: kotlin
        run: |
          mkdir -p /tmp/e2e-logs
          COMMON_ENV="SPRING_DATASOURCE_USERNAME=saga SPRING_DATASOURCE_PASSWORD=saga SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver"

          env $COMMON_ENV \
            SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/order_db \
            java -jar order-service/bootstrap/build/libs/bootstrap-*.jar \
            > /tmp/e2e-logs/order-service.log 2>&1 &

          env $COMMON_ENV \
            SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/payment_db \
            java -jar payment-service/bootstrap/build/libs/bootstrap-*.jar \
            > /tmp/e2e-logs/payment-service.log 2>&1 &

          env $COMMON_ENV \
            SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/compensation_db \
            java -jar compensation-service/bootstrap/build/libs/bootstrap-*.jar \
            > /tmp/e2e-logs/compensation-service.log 2>&1 &

          env $COMMON_ENV \
            SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/orchestrator_db \
            java -jar orchestrator/bootstrap/build/libs/bootstrap-*.jar \
            > /tmp/e2e-logs/orchestrator.log 2>&1 &

      - name: Wait for services to be healthy
        run: |
          services="8080 8081 8083 8084"
          for port in $services; do
            echo "Waiting for service on port $port..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:$port/actuator/health > /dev/null 2>&1; then
                echo "Service on port $port is healthy"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "Service on port $port failed to start"
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run E2E tests
        working-directory: kotlin
        run: ./gradlew :e2e-test:test --info

      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: kotlin/e2e-test/build/reports/tests/test/
          retention-days: 7

      - name: Upload service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-service-logs
          path: /tmp/e2e-logs/
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          pkill -f 'java -jar' || true

      - name: Stop infrastructure
        if: always()
        working-directory: docker
        run: docker compose down -v
