name: Deploy Swagger UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'services/**/openapi.yml'
      - 'kotlin/compensation-service/bootstrap/openapi.yml'
      - 'docs/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync specs
        run: |
          mkdir -p docs/specs
          cp services/orchestrator/openapi.yml docs/specs/orchestrator.yml
          cp services/order-service/openapi.yml docs/specs/order-service.yml
          cp services/payment-service/openapi.yml docs/specs/payment-service.yml
          cp kotlin/compensation-service/bootstrap/openapi.yml docs/specs/compensation-service.yml
          if ! git diff --quiet docs/specs/; then
            echo "::error::docs/specs/ is out of sync with source openapi.yml files. Run the copy commands above and commit."
            git diff docs/specs/
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
