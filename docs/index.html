<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saga Orchestration - API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      urls: [
        { url: './specs/orchestrator.yml', name: 'Orchestrator (:8080)' },
        { url: './specs/order-service.yml', name: 'Order Service (:8081)' },
        { url: './specs/payment-service.yml', name: 'Payment Service (:8083)' },
        { url: './specs/compensation-service.yml', name: 'Compensation Service (:8084)' },
      ],
      dom_id: '#swagger-ui',
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset,
      ],
      layout: 'StandaloneLayout',
    });
  </script>
</body>
</html>
