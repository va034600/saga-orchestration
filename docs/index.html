<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saga Orchestration - API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    .schema-nav {
      background: #1b1b1b;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .schema-nav span {
      color: #aaa;
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
    }
    .schema-nav a {
      color: #61affe;
      font-family: sans-serif;
      font-size: 14px;
      text-decoration: none;
    }
    .schema-nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <nav class="schema-nav">
    <span>Schema Docs:</span>
    <a href="./schema/orchestrator/">Orchestrator</a>
    <a href="./schema/order-service/">Order Service</a>
    <a href="./schema/payment-service/">Payment Service</a>
    <a href="./schema/compensation-service/">Compensation Service</a>
  </nav>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    SwaggerUIBundle({
      urls: [
        { url: './specs/orchestrator.yml', name: 'Orchestrator (:8080)' },
        { url: './specs/order-service.yml', name: 'Order Service (:8081)' },
        { url: './specs/payment-service.yml', name: 'Payment Service (:8083)' },
        { url: './specs/compensation-service.yml', name: 'Compensation Service (:8084)' },
      ],
      dom_id: '#swagger-ui',
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset,
      ],
      plugins: [
        SwaggerUIBundle.plugins.DownloadUrl,
      ],
      layout: 'StandaloneLayout',
    });
  </script>
</body>
</html>
